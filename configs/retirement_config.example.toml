# Example config for the `retirement-toolkit` CLI.
#
# Usage:
#   python -m retirement_toolkit.cli roth --config configs/retirement_config.example.toml three-paths
#   python -m retirement_toolkit.cli roth --config configs/retirement_config.example.toml report --format md --out outputs/report.md
#
# This mirrors the notebook's `INPUTS` structure.

[inputs.household]
tax_filing_status = "MFJ"
start_year = 2025
discount_rate = 0.0

[inputs.reporting]
value_basis = "nominal"

# Objective used to pick/highlight the "best" strategy in reports.
# Values: "after_tax" | "legacy" | "heirs" | "npv_taxes"
objective = "after_tax"

longevity_sensitivity_enabled = false
# longevity_horizons_years = [20, 25, 30, 35]

[inputs.spouse1]
name = "Spouse 1"
age = 70
traditional_ira = 900000
sep_ira = 0
roth_ira = 50000
ss_start_age = 70
ss_annual = 48000

[inputs.spouse2]
name = "Spouse 2"
age = 75
traditional_ira = 1150000
sep_ira = 0
roth_ira = 100000
ss_start_age = 68
ss_annual = 28000

[inputs.joint]
taxable_accounts = 450000

[inputs.plan]
monthly_income_need = 10000
minimum_cash_reserve = 75000

[inputs.assumptions]
inflation_rate = 0.025
taxable_return = 0.060
ira_return = 0.060
roth_return = 0.070

[inputs.medicare]
irmaa_enabled = false

[inputs.taxes]
niit_enabled = false
niit_nii_fraction_of_return = 0.70
niit_realization_fraction = 0.60

[inputs.events]
widow_event_enabled = false
# widow_year = 2032
# survivor = "spouse1"
# income_need_multiplier = 1.0

[inputs.withdrawal_policy]
income_tax_payment_source = "taxable"
conversion_tax_payment_source = "taxable"

[inputs.charity]
enabled = false
annual_amount = 0.0
use_qcd = true
qcd_eligible_age = 71
qcd_annual_cap_per_person = 100000.0

[inputs.heirs]
enabled = false
distribution_years = 10
heir_tax_rate = 0.30
