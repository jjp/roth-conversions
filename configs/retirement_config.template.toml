# Template config exported from retirement_template.ipynb's default INPUTS block.
#
# Run the canonical CLI like:
#   python -m retirement_toolkit.cli roth --config configs/retirement_config.template.toml three-paths
#   python -m retirement_toolkit.cli roth --config configs/retirement_config.template.toml report --format pdf --out outputs/report.pdf

[inputs.household]
tax_filing_status = "MFJ"
start_year = 2025
discount_rate = 0.0

[inputs.reporting]
# "nominal" = future dollars, "real" = start-year (today's) dollars
value_basis = "nominal"

# Objective used to pick/highlight the "best" strategy in reports.
# Values: "after_tax" | "legacy" | "heirs" | "npv_taxes"
objective = "after_tax"

# Optional: run the Three Paths model at multiple horizons.
longevity_sensitivity_enabled = false
# longevity_horizons_years = [20, 25, 30, 35]

[inputs.spouse1]
name = "Spouse 1"
age = 70
traditional_ira = 900000
sep_ira = 0
roth_ira = 50000
ss_start_age = 70
ss_annual = 48000

[inputs.spouse2]
name = "Spouse 2"
age = 75
traditional_ira = 1150000
sep_ira = 0
roth_ira = 100000
ss_start_age = 68
ss_annual = 28000

[inputs.joint]
taxable_accounts = 450000
ira_after_tax_basis = 0.0

[inputs.plan]
monthly_income_need = 10000
minimum_cash_reserve = 75000

[inputs.assumptions]
inflation_rate = 0.025
taxable_return = 0.06
ira_return = 0.06
roth_return = 0.07

[inputs.medicare]
# If enabled, applies IRMAA surcharges using pinned SSA/CMS tables and a 2-year lookback MAGI approximation.
irmaa_enabled = false

# If enabled, applies the standard Medicare Part B base premium using pinned SSA/CMS tables.
part_b_base_premium_enabled = false

# Optional override for number of covered people used for Medicare costs (Part B base premium and IRMAA).
# If omitted, defaults to 2 for MFJ and 1 otherwise.
# covered_people = 2

[inputs.taxes]
# Net Investment Income Tax (NIIT): simplified model based on taxable-account investment income.
niit_enabled = false

# NIIT realism knobs (only used when niit_enabled=true):
# - niit_nii_fraction_of_return: portion of the modeled taxable return treated as NII (div/interest/realized gains)
# - niit_realization_fraction: portion of that NII assumed realized each year
niit_nii_fraction_of_return = 0.70
niit_realization_fraction = 0.60

# Simplified state income tax (planning): flat effective rate applied to a chosen base.
state_tax_enabled = false
state_tax_rate = 0.0

# Base for state flat tax:
# - "agi" uses the model's internal AGI/MAGI approximation
# - "taxable_income" uses federal taxable income (after standard deduction)
state_tax_base = "agi"

# Optional: model qualified dividends and long-term capital gains (start-year dollars).
# These are taxed at preferential rates (0%/15%/20%) using pinned IRS thresholds and worksheet-style stacking.
qualified_dividends_annual = 0.0
long_term_capital_gains_annual = 0.0

# Tier A itemized deductions (planning): if enabled, deduction = max(standard deduction, itemized_deductions_annual)
itemized_deductions_enabled = false
itemized_deductions_annual = 0.0

[inputs.events]
# Widow modeling: from widow_year onward, switches to Single filing status and uses survivor SS (max of two).
widow_event_enabled = false
# widow_year = 2032
# survivor = "spouse1"  # "spouse1" | "spouse2" (informational; SS uses max benefit)
# income_need_multiplier = 1.0  # e.g., 0.85 to model lower expenses after first death

[inputs.withdrawal_policy]
# Where taxes are paid from:
# - "taxable": pay from taxable account (respects minimum_cash_reserve; remainder from IRA)
# - "ira": pay from IRA (grossed up using a marginal-rate approximation)
income_tax_payment_source = "taxable"
conversion_tax_payment_source = "taxable"

[inputs.charity]
# Planned annual charitable giving (start-year dollars).
# If enabled + use_qcd=true, the model will attempt to satisfy giving using a QCD from the IRA
# once either spouse reaches qcd_eligible_age (70½ rule).
enabled = false
annual_amount = 0.0
use_qcd = true
qcd_eligible_age = 70.5
qcd_annual_cap_per_person = 111000.0

[inputs.heirs]
# Simplified heirs modeling: inherited IRA/Roth must be distributed within distribution_years.
# IRA distributions are taxed at a flat effective rate heir_tax_rate.
enabled = false
distribution_years = 10  # common values: 5 or 10
heir_tax_rate = 0.30

[inputs.roth_rules]
# Roth conversion 5-year rule (simplified):
# - When enabled, withdrawals sourced from conversion principal within conversion_wait_years
#   and before qualified_age_years incur a penalty_rate.
# - policy="penalty" applies the penalty but allows the withdrawal.
# - policy="prevent" disallows using "young" conversion principal (forces other sources).
enabled = false
conversion_wait_years = 5
qualified_age_years = 60
penalty_rate = 0.10
policy = "penalty"  # "penalty" | "prevent"

[inputs.asset_location]
# Sensitivity runner: re-runs Three Paths under alternate Roth return assumptions.
# It does not re-allocate balances; it only changes return assumptions.
enabled = false
roth_return_deltas = [0.00, 0.01, 0.02]
