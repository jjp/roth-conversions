# Scenario example
# Couple where wife is receiving RMDs and husband is not (per this model's RMD age = 73).
# Approx. $5.0M in traditional IRA assets.
#
# Usage:
#   python -m retirement_toolkit.cli roth --config configs/retirement_config.scenario_wife_rmd_husband_no_rmd_5m_ira.toml three-paths
#   python -m retirement_toolkit.cli roth --config configs/retirement_config.scenario_wife_rmd_husband_no_rmd_5m_ira.toml report --format md --out outputs/scenario_wife_rmd_report.md

[inputs.household]
tax_filing_status = "MFJ"
start_year = 2026
discount_rate = 0.0

[inputs.reporting]
value_basis = "nominal"
objective = "after_tax"
longevity_sensitivity_enabled = false

# Husband: under 73 => no RMD under this model.
[inputs.spouse1]
name = "Husband"
age = 72
traditional_ira = 2_000_000
sep_ira = 0
roth_ira = 0
ss_start_age = 70
ss_annual = 45_000

# Wife: age 74 => RMDs apply (age >= 73).
[inputs.spouse2]
name = "Wife"
age = 74
traditional_ira = 3_000_000
sep_ira = 0
roth_ira = 0
ss_start_age = 70
ss_annual = 35_000

[inputs.joint]
# Optional taxable liquidity for tax payments / spending smoothing.
taxable_accounts = 500_000

[inputs.plan]
monthly_income_need = 16_000
minimum_cash_reserve = 150_000

[inputs.assumptions]
inflation_rate = 0.025
taxable_return = 0.06
ira_return = 0.06
roth_return = 0.07

[inputs.medicare]
irmaa_enabled = true
part_b_base_premium_enabled = true

[inputs.taxes]
niit_enabled = false
niit_nii_fraction_of_return = 0.70
niit_realization_fraction = 0.60

state_tax_enabled = false
state_tax_rate = 0.0
state_tax_base = "agi"

# Optional: if you want to model ongoing QD/LTCG independent of withdrawals.
qualified_dividends_annual = 0.0
long_term_capital_gains_annual = 0.0

itemized_deductions_enabled = false
itemized_deductions_annual = 0.0

[inputs.events]
widow_event_enabled = false

[inputs.withdrawal_policy]
income_tax_payment_source = "taxable"
conversion_tax_payment_source = "taxable"

[inputs.charity]
enabled = false
annual_amount = 0.0
use_qcd = true
qcd_eligible_age = 71
qcd_annual_cap_per_person = 100000.0

[inputs.heirs]
enabled = false
distribution_years = 10
heir_tax_rate = 0.30

[inputs.roth_rules]
enabled = false
conversion_wait_years = 5
qualified_age_years = 60
penalty_rate = 0.10
policy = "penalty"

[inputs.asset_location]
enabled = false
roth_return_deltas = [0.00, 0.01, 0.02]
