# Frank scenario
# Exercises NIIT (Net Investment Income Tax) in the simplified model.
# Built to push MAGI above the MFJ NIIT threshold via large taxable account returns.

[inputs.household]
tax_filing_status = "MFJ"
start_year = 2026
discount_rate = 0.0

[inputs.reporting]
value_basis = "nominal"
objective = "after_tax"
longevity_sensitivity_enabled = false

[inputs.spouse1]
name = "Spouse 1"
age = 65
traditional_ira = 1_500_000
sep_ira = 0
roth_ira = 300_000
ss_start_age = 70
ss_annual = 0

[inputs.spouse2]
name = "Spouse 2"
age = 64
traditional_ira = 1_000_000
sep_ira = 0
roth_ira = 300_000
ss_start_age = 70
ss_annual = 0

[inputs.joint]
# Large taxable base to generate significant investment income.
taxable_accounts = 3_500_000
ira_after_tax_basis = 0.0

[inputs.plan]
monthly_income_need = 18_000
minimum_cash_reserve = 250_000

[inputs.assumptions]
inflation_rate = 0.025
# Higher taxable return drives the NIIT base in the simplified model.
taxable_return = 0.09
ira_return = 0.06
roth_return = 0.07

[inputs.medicare]
irmaa_enabled = false
part_b_base_premium_enabled = false

[inputs.taxes]
niit_enabled = true
niit_nii_fraction_of_return = 0.80
niit_realization_fraction = 0.70

state_tax_enabled = false
state_tax_rate = 0.0
state_tax_base = "agi"

qualified_dividends_annual = 0.0
long_term_capital_gains_annual = 0.0

itemized_deductions_enabled = false
itemized_deductions_annual = 0.0

[inputs.events]
widow_event_enabled = false

[inputs.withdrawal_policy]
income_tax_payment_source = "taxable"
conversion_tax_payment_source = "taxable"

[inputs.charity]
enabled = false
annual_amount = 0.0
use_qcd = true
qcd_eligible_age = 70.5
qcd_annual_cap_per_person = 111000.0

[inputs.heirs]
enabled = false
distribution_years = 10
heir_tax_rate = 0.30

[inputs.roth_rules]
enabled = false
conversion_wait_years = 5
qualified_age_years = 60
penalty_rate = 0.10
policy = "penalty"

[inputs.asset_location]
enabled = false
roth_return_deltas = [0.00, 0.01, 0.02]
